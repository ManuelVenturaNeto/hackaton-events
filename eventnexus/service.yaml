apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/invoker-iam-disabled: 'true'
    run.googleapis.com/launch-stage: BETA
  name: hackaton-event
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: '5'
        autoscaling.knative.dev/minScale: '0'
        run.googleapis.com/startup-cpu-boost: 'true'
    spec:
      containerConcurrency: 80
      containers:
      - image: us-central1-docker.pkg.dev/dw-onfly-dev/hackaton-events/frontend:latest
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: '1'
            memory: 512Mi
        startupProbe:
          failureThreshold: 5
          initialDelaySeconds: 0
          periodSeconds: 5
          tcpSocket:
            port: 8080
          timeoutSeconds: 3
      - env:
        - name: PORT
          value: '8080'
        - name: DATABASE_URL
          value: postgresql://postgres.prvljsmnyxvvgzmvsgzz:Um%2A3z%2F%2AfhsC4nJR@aws-1-sa-east-1.pooler.supabase.com:6543/postgres
        - name: TICKETMASTER_API_KEY
          value: nkwy0usBgBifF7qrLUubV61qHqhkmU2j
        - name: EVENTBRITE_API_TOKEN
          value: 7EL5UEKUWJAIVHRXAT
        - name: GCP_PROJECT_ID
          value: dw-onfly-dev
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: adc.json
        - name: LOG_LEVEL
          value: INFO
        - name: CORS_ORIGINS
          value: '["*"]'
        - name: MAX_CONCURRENT_FETCHES
          value: '10'
        - name: REQUEST_TIMEOUT_SECONDS
          value: '30'
        image: us-central1-docker.pkg.dev/dw-onfly-dev/hackaton-events/fullstack:latest
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: '1'
            memory: 1Gi
        startupProbe:
          failureThreshold: 5
          initialDelaySeconds: 3
          periodSeconds: 10
          tcpSocket:
            port: 8080
          timeoutSeconds: 5
      serviceAccountName: 247888593708-compute@developer.gserviceaccount.com
      timeoutSeconds: 300
